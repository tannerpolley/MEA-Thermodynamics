name: Validate scientific manuscript

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install --yes latexmk texlive-fonts-recommended texlive-latex-extra texlive-science
      - name: Install locked project
        run: uv sync --locked --group test
      - name: Lint
        run: uv run ruff check src scripts analyses tests
      - name: Quick validation
        run: uv run python scripts/validate_project.py quick
      - name: Verify pinned ePC-SAFT integration
        run: uv run python scripts/check_epcsaft_integration.py --mode final
      - name: Build manuscript
        run: bash scripts/build_manuscript.sh
      - name: Verify manuscript freshness
        run: uv run python scripts/check_manuscript_freshness.py

      # Expensive Phase 3 regression/regeneration remains a manual final-release gate.
