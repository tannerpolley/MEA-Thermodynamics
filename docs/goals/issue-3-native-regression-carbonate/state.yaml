        - "Installed `fit_reactive_electrolyte_parameters` signature accepts a `ReactiveElectrolyteBatch` or context plus `initial_parameters`, bounds, `max_iterations`, `jacobian_mode`, and finite-difference step controls."
        - "Installed `ReactiveRegressionFitResult` signature lacks explicit `status`, `termination_reason`, `objective_initial`, and `objective_final` fields even though issue #3 requires package-derived specific statuses."
        - "Sibling ePC-SAFT dirty source appears to add explicit fit status fields and a capability contract where `bounded_incomplete` is not a valid status, but it is not yet installed into MEA."
        - "`bounded_incomplete` appears in MEA tests, current global regression JSON artifacts, audit docs, and manuscript sections/tables."
