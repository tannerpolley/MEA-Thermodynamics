id: activity_epcsaft
title: Phase 2 Activity-Based ePC-SAFT Evaluation
status: manuscript_evidence
summary: Runs the true-species MEA-CO2-H2O activity-equilibrium model with fixed reaction constants, strict solver acceptance, and residual-gated manuscript claims.
owner: project
inputs:
  - path: data/reference/MEA/manifests/phase2_reaction_constant_source_verification.csv
    kind: verified_activity_reaction_catalog
  - path: data/reference/MEA/VLE/Combined_VLE.csv
    kind: active_v1_experimental_vle_view
  - path: data/reference/MEA/ChEq/Combined_ChEq.csv
    kind: active_v1_experimental_speciation_view
  - path: data/reference/MEA/ChEq/Canonical_Combined_ChEq.csv
    kind: full_canonical_speciation_registry
  - path: data/reference/epcsaft_datasets/MEA_CO2_H2O_phase2
    kind: fixed_parameter_artifact
outputs:
  - path: analyses/phase2/activity_epcsaft/results
    kind: canonical_solver_results_diagnostics_and_claim_gates
  - path: analyses/phase2/activity_epcsaft/figures/pressure/output
    kind: pressure_plot_bundle
  - path: analyses/phase2/activity_epcsaft/figures/speciation/output
    kind: speciation_plot_bundles
commands:
  generate:
    - uv run python analyses/phase2/activity_epcsaft/scripts/generate_data.py
  render:
    - uv run python analyses/phase2/activity_epcsaft/scripts/render_figures.py
runtime:
  class: expensive
  expected_seconds: 420
manuscript_consumers:
  - docs/latex/sections/data_methods.tex
  - docs/latex/sections/mea_system_modeling_results.tex
  - docs/latex/tables/residual_summary.tex
results_policy: Track canonical solver tables and claim-gate reports under results, and only exact plotted-data snapshots with sidecar, PNG, SVG, and PDF bundles under figures.
