    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current roadmap/package ingest files, live manifests, repo-local paper Markdown, manuscript/roadmap targets, figure artifacts, and package-dependent commands without editing implementation files."
    inputs:
      - "docs/roadmaps"
      - "docs/prompts/MEA_ePCSAFT"
      - "data/reference/MEA/manifests"
      - "docs/papers/md"
      - "docs/latex"
      - "analyses"
      - "uv.lock"
      - "global_regression_summary.json or matching live artifact if present"
    constraints:
      - "Read-only."
      - "Do not run package-dependent validation."
      - "Do not web search."
      - "Do not paste full article text."
      - "Prefer concrete file-path evidence and exact gaps."
    expected_output:
      - "File/artifact map for the ingested roadmap package."
      - "What can proceed without ePC-SAFT."
      - "What is blocked by the missing ePC-SAFT dev build."
      - "Candidate bounded Worker slices with candidate allowed_files."
