id: smith_missen_baseline
title: Phase 1 Smith-Missen Baseline
layout: analyses/phase1/smith_missen_baseline
commands:
  generate_data: uv run python analyses/phase1/smith_missen_baseline/scripts/generate_data.py
  render_figures: uv run python analyses/phase1/smith_missen_baseline/scripts/render_figures.py
results_policy: Track compatibility CSV snapshots, .mpl.yaml sidecars, PNG previews, SVG figures, and PDF LaTeX artifacts under results/ while keeping figure-owned input/output folders under figures/<figure_id>/.
figures:
  pressure:
    input: analyses/phase1/smith_missen_baseline/figures/pressure/input
    output: analyses/phase1/smith_missen_baseline/figures/pressure/output
    scripts: analyses/phase1/smith_missen_baseline/figures/pressure/scripts
  speciation:
    input: analyses/phase1/smith_missen_baseline/figures/speciation/input
    output: analyses/phase1/smith_missen_baseline/figures/speciation/output
    scripts: analyses/phase1/smith_missen_baseline/figures/speciation/scripts
