      summary: "Mapped overlay files, manifests, repo-local paper Markdown, Phase 3 status, figure plan boundary, and package blockers. Safe work can proceed on manifests, extraction schemas, claim audit, figure mapping, and dependency-gap docs without ePC-SAFT execution."
