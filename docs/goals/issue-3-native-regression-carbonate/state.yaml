version: 2

goal:
  title: "Implement MEA Issue 3 Native Regression Delegation"
  slug: "issue-3-native-regression-carbonate"
  kind: specific
  tranche: "Rescope MEA production fitting around ePC-SAFT native regression delegation, structured targets/results, approval gates, and carbonate Born decision evidence."
  status: active
  intake:
    original_request: "Prep for the new posted issue on this project's GitHub and be ready to fully implement it strictly; issue is MEA-Thermodynamics #3, not ePC-SAFT #52."
    interpreted_outcome: "A GoalBuddy board is ready to implement MEA-Thermodynamics issue #3 strictly in this repo, starting with Scout evidence mapping and continuing through MEA code/test/manuscript validation without touching ePC-SAFT unless a verified API blocker requires escalation."
    input_shape: specific
    audience: "User, MEA-Thermodynamics maintainers, manuscript workflow agents"
    authority: requested
    proof_type: artifact
    completion_proof: "Final audit proves issue #3 implemented in MEA or records exact blockers, with tests, quick validation, native regression artifact evidence, and carbonate promotion-gate status."
    likely_misfire: "Repeating the earlier mistake by treating the work as ePC-SAFT package-owned, or only documenting the issue without removing MEA production SciPy optimizer ownership and adding native-result approval gates."
    blind_spots_considered:
      - "The ePC-SAFT native regression API may already exist, may be incomplete, or may have a different function name than the issue body assumes."
      - "MEA may still need diagnostic SciPy code for old artifacts, but production promotion must not use it."
      - "Approval gates must be strict enough to reject trace-only carbonate movement."
      - "Manuscript language must be driven by package fit status, not vague bounded labels."
      - "Current uncommitted MEA changes from the previous refresh must be preserved and not reverted."
    existing_plan_facts:
      - "Correct issue is https://github.com/tannerpolley/MEA-Thermodynamics/issues/3."
      - "Misplaced ePC-SAFT issue https://github.com/tannerpolley/ePC-SAFT/issues/52 was closed."
      - "Issue #3 says MEA should stop owning parameter optimization logic and delegate production fitting to ePC-SAFT native C++ regression."
      - "Current carbonate diagnostic: promoted regularized 3.0/3.0, unanchored trace-only 6.80294/2.99744."
      - "Do not vendor ePC-SAFT inside MEA. Use sibling package dependency only."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: T999

