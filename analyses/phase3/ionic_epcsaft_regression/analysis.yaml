id: ionic_epcsaft_regression
title: Full-Ionic ePC-SAFT Diagnostic Evaluation
status: provisional_diagnostic
summary: Evaluates the full-ionic model with fixed provisional ion parameters, retaining rejected states for diagnosis while excluding them from metrics and plots.
owner: project
inputs:
  - path: data/reference/MEA/manifests/phase2_reaction_constant_source_verification.csv
    kind: verified_activity_reaction_catalog
  - path: data/reference/MEA/VLE/Combined_VLE.csv
    kind: active_v1_experimental_vle_view
  - path: data/reference/MEA/ChEq/Combined_ChEq.csv
    kind: active_v1_experimental_speciation_view
  - path: data/reference/MEA/ChEq/Canonical_Combined_ChEq.csv
    kind: full_canonical_speciation_registry
  - path: src/MEA/epcsaft_ionic/plot_results.py
    kind: fixed_provisional_parameter_definition
outputs:
  - path: analyses/phase3/ionic_epcsaft_regression/results/pressure
    kind: accepted_and_rejected_pressure_diagnostics
  - path: analyses/phase3/ionic_epcsaft_regression/results/speciation
    kind: accepted_and_rejected_speciation_diagnostics
commands:
  generate:
    - uv run python analyses/phase3/ionic_epcsaft_regression/scripts/generate_data.py
  render:
    - uv run python analyses/phase3/ionic_epcsaft_regression/scripts/render_figures.py
runtime:
  class: expensive
  expected_seconds: 300
manuscript_consumers:
  - docs/latex/sections/mea_system_modeling_results.tex
results_policy: Track canonical diagnostic rows and exact plotted-data bundles under results; preserve rejected rows with reasons, exclude them from metrics and plots, and make no fitted-parameter claim.
