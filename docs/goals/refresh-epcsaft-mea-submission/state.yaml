version: 2

goal:
  title: "Refresh ePC-SAFT MEA Submission Workflow"
  slug: "refresh-epcsaft-mea-submission"
  kind: specific
  tranche: "Refresh latest local ePC-SAFT into MEA, rerun data/regression/figure/manuscript workflow, fix friction, and audit submission readiness."
  status: done
  intake:
    original_request: "Reinstall latest ePC-SAFT, rerun/retry all MEA project actions/tests/scripts, fix friction, and validate data-to-regression-to-LaTeX manuscript workflow."
    interpreted_outcome: "The merged MEA main branch is validated against the latest local ePC-SAFT package and has fresh, internally consistent regression artifacts, figures, tests, and manuscript build evidence."
    input_shape: specific
    audience: "User and future MEA/ePC-SAFT manuscript agents"
    authority: requested
    proof_type: artifact
    completion_proof: "Final audit shows package install evidence, script/test/build outputs, refreshed or intentionally unchanged artifacts, bounded scientific claims, and no unresolved local friction."
    likely_misfire: "Only run a few green tests or rebuild the PDF without proving package reinstall effects, stale-artifact status, regression drift, manuscript claim boundaries, and data provenance."
    blind_spots_considered:
      - "Local ePC-SAFT may have unmerged or dirty changes that should not be overwritten."
      - "The latest ePC-SAFT API may alter solver behavior or package metadata."
      - "Global pressure/speciation regression may remain bounded-incomplete due reactive objective cost."
      - "Generated figures may become stale after reinstall."
      - "LaTeX manuscript may build while still containing overclaims or internal workflow language."
      - "Zotero-owned references.bib must not be manually edited."
    existing_plan_facts:
      - "Root `plan.md` documents submission-readiness phases."
      - "Merged main contains global regression, train/validation, sensitivity, residual diagnostics, literature comparison, and manuscript availability artifacts."
      - "Use `.venv\\Scripts\\python.exe` directly in MEA unless a task proves another environment is required."
      - "`docs/latex` is the source of truth; Overleaf mirror sync is not required unless explicitly selected."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the current MEA and local ePC-SAFT states, package install method, validation commands, and likely friction points before any writes."
    inputs:
      - "C:\\Users\\Tanner\\Documents\\git\\MEA-Thermodynamics"
      - "C:\\Users\\Tanner\\Documents\\git\\ePC-SAFT"
      - "plan.md"
      - "docs/ePC-SAFT/full-ionic-parameter-manuscript-completion-audit.md"
      - "docs/.codex-journal/project_memory.md"
    constraints:
      - "Read-only."
      - "Do not reinstall or edit files."
      - "Use bounded command output."
      - "Identify exact commands to run in later Worker tasks."
    expected_output:
      - "Current branch and dirty state for both repos."
      - "How MEA currently imports/installs ePC-SAFT."
      - "Exact reinstall command candidate."
      - "Exact validation command list."
      - "Ranked friction risks."
      - "Candidate next Worker task with allowed_files, verify, and stop_if."
    receipt:
      result: done
      summary: "Mapped current MEA/ePC-SAFT repo state, install source, missing pip friction, reinstall candidates, validation commands, and risks."
      evidence:
        - "MEA repo: `main...origin/main`; only `docs/goals/` untracked from board creation."
        - "ePC-SAFT repo: `main...origin/main`, clean; latest commit `544a6b8 Merge pull request #50 from tannerpolley/codex/issues-45-46-completion`."
        - "MEA `.venv` imports `epcsaft` from `.venv\\Lib\\site-packages\\epcsaft\\__init__.py`, version `1.5.2`."
        - "`epcsaft-1.5.2.dist-info/direct_url.json` points to `file:///<upstream-ePC-SAFT>` with `editable=false`."
        - "MEA `.venv` has no `python -m pip`, no `pip.exe`, and no `pip3.exe`; pyvenv was created by uv 0.11.7."
        - "MEA `pyproject.toml` depends on `epcsaft @ file:///<upstream-ePC-SAFT>`."
        - "Merged main includes global regression, train/validation, sensitivity, residual diagnostics, and tests."
      reinstall_candidate:
        - "Prefer `uv pip install --python .venv\\Scripts\\python.exe --reinstall --no-deps C:\\Users\\Tanner\\Documents\\git\\ePC-SAFT` if uv is available."
        - "Fallback if uv is unavailable: bootstrap pip with `.venv\\Scripts\\python.exe -m ensurepip --upgrade`, then `.venv\\Scripts\\python.exe -m pip install --force-reinstall --no-deps C:\\Users\\Tanner\\Documents\\git\\ePC-SAFT`."
      validation_candidates:
        - ".venv\\Scripts\\python.exe -c \"import epcsaft; print(epcsaft.__version__, epcsaft.__file__)\""
        - ".venv\\Scripts\\python.exe scripts\\doctor.py"
        - ".venv\\Scripts\\python.exe -m unittest discover tests -v"
        - ".venv\\Scripts\\python.exe scripts\\validate_project.py quick"
      ranked_friction_risks:
        - "Missing pip in `.venv` can block direct package reinstall."
        - "Local source install is non-editable, so ePC-SAFT source changes are not reflected until reinstall."
        - "Native ePC-SAFT build may need build dependencies or uv build cache."
        - "All-row reactive/global regression may be slow or bounded-incomplete."
        - "Artifact refresh may change metrics and require manuscript claim-boundary review."
      candidate_next_worker:
        objective: "Reinstall latest local ePC-SAFT into MEA `.venv` using the safest available installer, then verify import path/version and doctor."
        allowed_files:
          - ".venv/**"
          - "docs/goals/refresh-epcsaft-mea-submission/state.yaml"
        verify:
          - ".venv\\Scripts\\python.exe -c \"import epcsaft; print(epcsaft.__version__, epcsaft.__file__)\""
          - ".venv\\Scripts\\python.exe scripts\\doctor.py"
        stop_if:
          - "ePC-SAFT source repo becomes dirty or needs destructive cleanup."
          - "Installer requires credentials or destructive environment recreation."
          - "Import path/version cannot be verified after reinstall."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review Scout evidence and choose the safest reinstall-and-baseline Worker slice."
    inputs:
      - "T001 receipt"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Prefer reversible package reinstall and baseline checks before artifact regeneration."
    expected_output:
      - "Decision."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
    receipt:
      result: done
      summary: "Selected uv-based reinstall as the safest first Worker slice because the venv lacks pip but uv 0.11.7 is available and the dependency is already a local file dependency."
      decision: "Run `uv pip install --python .venv\\Scripts\\python.exe --reinstall --no-deps C:\\Users\\Tanner\\Documents\\git\\ePC-SAFT`, then verify `epcsaft` import path/version and `scripts\\doctor.py`."
      worker_objective: "Reinstall the latest local ePC-SAFT package into the MEA environment and run baseline import/package checks."
      allowed_files:
        - ".venv/**"
        - "docs/goals/refresh-epcsaft-mea-submission/state.yaml"
        - "docs/goals/refresh-epcsaft-mea-submission/notes/**"
      verify:
        - ".venv\\Scripts\\python.exe -c \"import epcsaft; print(getattr(epcsaft, '__version__', 'no-version')); print(getattr(epcsaft, '__file__', 'no-file'))\""
        - ".venv\\Scripts\\python.exe scripts\\doctor.py"
      stop_if:
        - "Local ePC-SAFT repo has unexpected dirty changes that would be overwritten."
        - "uv reinstall fails because build dependencies or native build are unavailable."
        - "Import path/version cannot be verified after reinstall."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Reinstall the latest local ePC-SAFT package into the MEA environment and run baseline import/package checks."
    allowed_files:
      - ".venv/**"
      - "docs/goals/refresh-epcsaft-mea-submission/state.yaml"
      - "docs/goals/refresh-epcsaft-mea-submission/notes/**"
    verify:
      - "C:\\Users\\Tanner\\Documents\\git\\MEA-Thermodynamics\\.venv\\Scripts\\python.exe -m pip show epcsaft"
      - "C:\\Users\\Tanner\\Documents\\git\\MEA-Thermodynamics\\.venv\\Scripts\\python.exe -c \"import epcsaft, inspect; print(getattr(epcsaft, '__file__', 'no-file'))\""
      - "C:\\Users\\Tanner\\Documents\\git\\MEA-Thermodynamics\\.venv\\Scripts\\python.exe scripts\\doctor.py"
    stop_if:
      - "Local ePC-SAFT repo has unexpected dirty changes that would be overwritten."
      - "pip install needs network credentials or destructive environment cleanup."
      - "Import path does not point to the intended local ePC-SAFT package after reinstall."
    receipt:
      result: done
      summary: "Reinstalled the latest local ePC-SAFT source into the MEA `.venv` with uv and verified baseline package imports."
      changed_files:
        - ".venv/**"
      commands:
        - command: "uv pip install --python .venv\\Scripts\\python.exe --reinstall --no-deps C:\\Users\\Tanner\\Documents\\git\\ePC-SAFT"
          status: pass
        - command: ".venv\\Scripts\\python.exe -c \"import epcsaft; print(epcsaft.__version__); print(epcsaft.__file__)\""
          status: pass
        - command: ".venv\\Scripts\\python.exe scripts\\doctor.py"
          status: pass
      observed:
        - "Built and installed `epcsaft==1.5.2` from `file:///<upstream-ePC-SAFT>`."
        - "Import verified from `C:\\Users\\Tanner\\Documents\\git\\MEA-Thermodynamics\\.venv\\Lib\\site-packages\\epcsaft\\__init__.py`."
        - "`scripts\\doctor.py` reported all OK."
        - "MEA and ePC-SAFT git states remain clean except GoalBuddy board files."

  - id: T004
