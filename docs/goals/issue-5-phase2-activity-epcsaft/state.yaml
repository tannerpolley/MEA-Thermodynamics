  intake:
    original_request: "Begin planning for Phase 2 implementation using GoalBuddy, go to GitHub, and begin implementing all steps explicitly on issue #5."
    interpreted_outcome: "A GoalBuddy-tracked implementation lane begins for MEA-Thermodynamics issue #5 and advances the Phase 2 design, dependency, convention, parameter, analysis, and validation artifacts without overclaiming Phase 3 regression."
    input_shape: specific
    audience: "User, MEA-Thermodynamics maintainers, manuscript workflow agents"
    authority: requested
    proof_type: artifact
    completion_proof: "Issue #5 acceptance criteria are mapped to repo artifacts; Phase 2 data and figure commands either reproduce the required outputs or record exact package/data blockers; validation passes without Phase 3 regression claims."
    likely_misfire: "Creating a local solver or empty scaffold workflow that appears to satisfy issue #5 while silently mixing reaction-constant bases, fabricating missing data, or bypassing upstream ePC-SAFT package boundaries."
    blind_spots_considered:
      - "Generic activity-based speciation and VLE/fugacity support may be incomplete in the currently pinned ePC-SAFT package."
      - "Reaction constants may remain apparent-basis inputs unless a documented conversion exists."
      - "Wong Raman, Amundsen density/viscosity, pH, dielectric, and ionic activity data have different readiness and validation roles."
      - "MEA f_solv must not be promoted from pressure data alone."
      - "Phase 2 must not claim final global regression or Phase 3 parameter fitting."
    existing_plan_facts:
      - "GitHub issue: https://github.com/tannerpolley/MEA-Thermodynamics/issues/5"
      - "Issue #5 has no comments as of 2026-05-15 local inspection."
      - "Liquid true species: CO2, MEA, H2O, MEAH+, MEACOO-, HCO3-, CO3^2-, H3O+, OH-."
      - "Volatile vapor species: CO2, H2O, MEA."
      - "Reactions R1-R5 must each record constant basis and conversion status."
      - "Required first files include docs/roadmaps/phase2_activity_speciation_design.md, docs/roadmaps/epcsaft_dependency_matrix.md, docs/roadmaps/phase2_reaction_constant_basis.md, data/reference/MEA/manifests/phase2_reaction_constant_manifest.csv, data/reference/epcsaft_datasets/MEA_CO2_H2O_phase2/, and analyses/phase2_activity_epcsaft/."
      - "Do not create MEA-specific public APIs in epcsaft; missing package support must be documented as a package dependency."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
