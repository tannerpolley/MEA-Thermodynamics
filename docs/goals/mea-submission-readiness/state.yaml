# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "MEA-Thermodynamics Submission Readiness"
  slug: "mea-submission-readiness"
  kind: existing_plan # specific | open_ended | existing_plan | recovery | audit
  tranche: "Complete repo-owned submission-readiness work while gating package-dependent Phase 2/3 execution behind upstream ePC-SAFT readiness."
  status: done # active | blocked | done
  intake:
    original_request: "Prepare a GoalBuddy board for MEA-Thermodynamics submission-readiness while the upstream ePC-SAFT package build is unavailable."
    interpreted_outcome: "A valid GoalBuddy board drives a PR-ready MEA-Thermodynamics tranche for data/provenance/manuscript/roadmap work that does not require a working ePC-SAFT dev build."
    input_shape: existing_plan # vague | specific | existing_plan | recovery | audit
    audience: "Tanner and future Codex GoalBuddy agents"
    authority: requested # requested | approved | inferred | needs_approval | blocked
    proof_type: artifact # test | demo | artifact | metric | review | source_backed_answer | decision
    completion_proof: "Valid state.yaml; internally consistent roadmaps/manifests; no Phase 3/global regression completion overclaims; extracted data trace to repo-local Markdown with source/status metadata; generic ePC-SAFT blockers documented; cleanup hook run."
    likely_misfire: "Treating the unavailable ePC-SAFT build as the main task, fabricating or web-searching missing data, or declaring Phase 3/global regression complete."
    blind_spots_considered:
      - "The ePC-SAFT dev worktree path in uv.lock may be missing and may block package-dependent validation."
      - "Loaded-MEA pH/electrochemical and direct MEAH+/carbamate osmotic-activity sources are pending and should not trigger web search without approval."
      - "Manuscript/roadmap overclaims and local path leakage can invalidate submission readiness even if data artifacts look complete."
      - "Figure readiness must be mapped to the strict 15-figure plan, not only to existing diagnostic outputs."
    existing_plan_facts:
      - "ZIP overlay has been copied into docs/roadmaps, docs/prompts/MEA_ePCSAFT, and data/reference/MEA/manifests."
      - "Wong 2015 and Amundsen 2009 Markdown files exist under docs/papers/md and need extraction into machine-readable repo data."
      - "MEA-H2O dielectric remains a literature-lead extraction task."
      - "Loaded-MEA pH/electrochemical and direct MEAH+/carbamate osmotic-activity data remain source-pending."
      - "Current Phase 3 is not accepted: global_regression_summary.json reports package_fit_not_completed, attempted_optimization=false, and selected_parameter_set=promoted_ionic_fit."
      - "The ePC-SAFT dev worktree path in uv.lock is currently missing, so package-dependent validation may be blocked."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  # installed | bundled_not_installed | missing | unknown
  scout: installed
  worker: installed
  judge: installed

visual_board:
  # none | local | github_projects | both | unknown
  selected: local
  local:
    status: live # not_requested | starting | live | generated | blocked
    url: "http://127.0.0.1:41737/mea-submission-readiness/"
    command: "node C:\\Users\\Tanner\\.codex\\plugins\\cache\\goalbuddy\\goalbuddy\\0.3.6\\skills\\goalbuddy\\extend\\local-goal-board\\scripts\\local-goal-board.mjs --goal docs/goals/mea-submission-readiness"
  github_projects:
    status: not_requested # not_requested | needs_approval | dry_run_ready | synced | blocked
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
