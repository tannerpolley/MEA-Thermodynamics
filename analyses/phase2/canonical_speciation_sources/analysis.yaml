id: canonical_speciation_sources
title: Canonical MEA Speciation Source Plots
status: source_audit
summary: Renders basis-separated, data-only plots from the canonical experimental MEA speciation dataset for literature-source inspection.
owner: project
inputs:
  - path: data/reference/MEA/observations/liquid_speciation/Canonical_Combined_ChEq.csv
    kind: experimental_speciation_dataset
outputs:
  - path: analyses/phase2/canonical_speciation_sources/figures/speciation/output
    kind: source_plot_bundles
commands:
  generate:
    - uv run python analyses/phase2/canonical_speciation_sources/scripts/generate_data.py
  render:
    - uv run python analyses/phase2/canonical_speciation_sources/scripts/render_figures.py
runtime:
  class: quick
  expected_seconds: 10
manuscript_consumers: []
results_policy: Track only source summaries, exact plotted-data snapshots, sidecars, PNGs, SVGs, and PDFs under the figure-owned output directory.
